name: Deploy Charan Logistics to GitHub Pages

on:
  push:
    branches:
      - main  # runs every time you push to main branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Password Hash
        run: |
          HASH=$(echo -n "${{ secrets.ACCESS_PASSWORD }}" | sha256sum | awk '{print $1}')
          sed -i "s|%%ACCESS_HASH%%|$HASH|g" login.html

      - name: Inject Google Sheets URL
        run: |
          sed -i 's|__WEBAPP_URL_PLACEHOLDER__|${{ secrets.WEBAPP_URL }}|g' index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # uploads entire repo root folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
